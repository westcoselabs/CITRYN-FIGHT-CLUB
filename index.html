<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c0a16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Citryn Fight Club</title>
<link rel="icon" href="./assets/favicon.jpg">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c0a16;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;overscroll-behavior:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 0%,#1a1430 0%,#0c0a16 70%);}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;
    box-shadow:0 0 60px rgba(0,229,255,.18),0 0 0 2px rgba(0,229,255,.10) inset;}
  #cutscene-layer{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(100vw,177.7778vh);height:min(100vh,56.25vw);z-index:30;display:none;
    overflow:hidden;background:#080610;pointer-events:none;}
  #cutscene-layer.active{display:block;}
  #cutscene-layer video{display:none;width:100%;height:100%;object-fit:cover;background:#080610;}
  #cutscene-layer video.active{display:block;}
  #dev{position:fixed;top:4px;left:4px;color:#19e3a0;font:12px/1.3 monospace;display:none;
    text-shadow:0 0 4px #000;z-index:50;white-space:pre;}
  #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#ffb33e;font-weight:bold;letter-spacing:2px;z-index:60;gap:14px;background:#0c0a16;}
  #loading .bar{width:240px;height:8px;background:#241c3a;border:1px solid #00e5ff55;border-radius:6px;overflow:hidden;}
  #loading .fill{height:100%;width:0;background:linear-gradient(90deg,#00e5ff,#ffb33e);transition:width .2s;}
  #loading small{color:#7a6ca8;letter-spacing:1px;font-weight:normal;}
  /* online lobby overlay (copy/share + join) - the only DOM the game shows over the canvas */
  #netui{position:fixed;inset:0;z-index:45;display:none;pointer-events:none;color:#fff;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  #netui .panel{pointer-events:auto;box-sizing:border-box;}
  #net-entry{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(92vw,460px);background:rgba(16,12,30,0.97);border:2px solid #00e5ff66;border-radius:16px;
    box-shadow:0 0 44px rgba(0,229,255,.28);padding:28px 24px;text-align:center;display:none;}
  #net-share{position:absolute;left:50%;top:14px;transform:translateX(-50%);
    background:rgba(16,12,30,0.94);border:1px solid #00e5ff55;border-radius:12px;padding:10px 16px;
    display:none;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;max-width:94vw;}
  #netui h3{margin:0 0 18px;letter-spacing:2px;color:#ffce4a;text-shadow:0 0 12px #ff5c33;font-size:22px;}
  #netui button{cursor:pointer;border:none;border-radius:10px;font-weight:800;letter-spacing:1px;
    padding:14px 18px;font-size:16px;color:#0c0a16;background:#ffb33e;transition:filter .1s;}
  #netui button:hover{filter:brightness(1.12);}
  #netui button.alt{background:#00e5ff;}
  #netui button.ghost{background:transparent;color:#9bffec;border:1px solid #00e5ff66;}
  #net-create{display:block;width:100%;margin-bottom:18px;padding:16px;font-size:18px;
    background:linear-gradient(90deg,#ff7a33,#ffce4a);}
  #net-entry .or{color:#7a6ca8;letter-spacing:2px;font-size:13px;margin:6px 0 12px;}
  #net-entry .joinrow{display:flex;gap:8px;}
  #net-join-input{flex:1;min-width:0;background:#0c0a16;border:1px solid #00e5ff66;border-radius:10px;
    color:#fff;padding:13px 12px;font-size:16px;outline:none;text-align:center;letter-spacing:2px;
    user-select:text;-webkit-user-select:text;}
  #net-join-input::placeholder{color:#5c5278;letter-spacing:1px;}
  #net-entry .backrow{margin-top:18px;}
  #net-share .lbl{color:#9bffec;font-size:13px;letter-spacing:1px;}
  #net-share .code{font-size:24px;font-weight:900;letter-spacing:4px;color:#fff;background:#0c0a16;
    border:1px dashed #00e5ff66;border-radius:8px;padding:5px 14px;user-select:all;-webkit-user-select:all;}
  #net-share button{padding:10px 14px;font-size:14px;}
  #net-copied{color:#7cff9b;font-weight:800;letter-spacing:1px;opacity:0;transition:opacity .2s;}
  #net-copied.show{opacity:1;}

  /* Mobile control layer. It sends normal keyboard events into game.js, so the engine/netcode stays untouched. */
  #mobile-controls{position:fixed;inset:0;z-index:42;display:none;pointer-events:none;color:#fff;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    --panel-shell:#111622;--panel-core:#090c14;--panel-edge:#2c334a;--violet:#d888ff;--violet-deep:#7330c8;
    --cyan:#28e9ff;--cyan-deep:#008fb2;--orange:#ffbf38;--orange-deep:#f06b19;--blue:#5db4ff;--blue-deep:#1457d8;
    --play-left:0px;--play-right:100vw;--play-top:0px;--play-bottom:100vh;--gutter-left:0px;--gutter-right:0px;}
  #mobile-controls.cinematic-hidden{display:none!important;}
  #mobile-controls.game-started .mobile-start-hint{display:none;}
  #mobile-controls button{pointer-events:auto;touch-action:none;-webkit-user-select:none;user-select:none;
    border:1px solid rgba(255,255,255,.12);outline:none;color:#f7f0dc;font-weight:900;letter-spacing:.06em;
    text-transform:uppercase;text-shadow:0 2px 0 rgba(0,0,0,.62);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 0 0 2px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.06),0 8px 18px rgba(0,0,0,.42);
    background:
      linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,0) 24%),
      repeating-linear-gradient(180deg,rgba(255,255,255,.04) 0 2px,rgba(255,255,255,0) 2px 5px),
      linear-gradient(180deg,rgba(18,24,39,.98),rgba(8,11,19,.98));
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  #mobile-controls button::before{content:"";position:absolute;inset:5px;border-radius:inherit;pointer-events:none;
    border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 0 0 1px rgba(0,0,0,.45);}
  #mobile-controls button.is-down{transform:translateY(2px) scale(.97);filter:brightness(1.18);
    box-shadow:inset 0 0 18px rgba(255,206,74,.22),inset 0 0 0 2px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.38);}
  .touch-pad,.touch-actions,.touch-menu{position:absolute;overflow:visible;
    background:
      linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,0) 16%),
      repeating-linear-gradient(135deg,rgba(255,255,255,.02) 0 3px,rgba(255,255,255,0) 3px 7px),
      linear-gradient(180deg,#1b2131 0%,#0b0f18 100%);
    border:1px solid rgba(182,130,255,.22);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 0 0 2px rgba(6,8,15,.92),0 0 0 1px rgba(255,128,214,.08),0 16px 28px rgba(0,0,0,.40);}
  .touch-pad::before,.touch-actions::before,.touch-menu::before{content:"";position:absolute;inset:6px;border-radius:inherit;pointer-events:none;
    border:1px solid rgba(255,255,255,.05);box-shadow:inset 0 0 0 1px rgba(0,0,0,.5);}
  .touch-pad{left:max(16px,env(safe-area-inset-left));bottom:max(22px,env(safe-area-inset-bottom));width:224px;height:184px;border-radius:32px;}
  .touch-actions{right:max(16px,env(safe-area-inset-right));bottom:max(22px,env(safe-area-inset-bottom));width:230px;height:178px;border-radius:30px;}
  .touch-menu{left:50%;bottom:max(20px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:10px;align-items:center;justify-content:center;
    border-radius:20px;padding:10px 12px 12px;}
  .touch-btn{position:absolute;width:68px;height:68px;border-radius:20px;font-size:24px;color:var(--violet);}
  .touch-up{left:77px;top:8px}.touch-left{left:8px;top:78px}.touch-right{left:146px;top:78px}.touch-down{left:77px;top:106px}
  .touch-btn::after,.menu-btn::after{content:"";position:absolute;inset:10px;border-radius:inherit;pointer-events:none;opacity:.38;
    background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 14%,transparent 29%,transparent 100%);}
  .action-btn{position:absolute;width:76px;height:76px;border-radius:50%;font-size:21px;}
  .action-punch,.action-kick,.action-block,.action-super{color:#eefcff;}
  .action-punch{left:8px;right:auto;bottom:26px;color:#d6feff!important;
    background:
      radial-gradient(circle at 30% 28%,rgba(255,255,255,.28),rgba(255,255,255,0) 30%),
      repeating-linear-gradient(180deg,rgba(255,255,255,.06) 0 2px,rgba(255,255,255,0) 2px 6px),
      linear-gradient(180deg,#1799b6,#07536d)!important;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.5),0 0 0 2px rgba(36,238,255,.22),0 0 18px rgba(36,238,255,.20),0 10px 18px rgba(0,0,0,.38)!important;}
  .action-kick{left:146px;right:auto;bottom:26px;color:#e4f0ff!important;
    background:
      radial-gradient(circle at 30% 28%,rgba(255,255,255,.28),rgba(255,255,255,0) 30%),
      repeating-linear-gradient(180deg,rgba(255,255,255,.06) 0 2px,rgba(255,255,255,0) 2px 6px),
      linear-gradient(180deg,#2c7ef8,#1747a8)!important;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.5),0 0 0 2px rgba(93,180,255,.22),0 0 18px rgba(93,180,255,.18),0 10px 18px rgba(0,0,0,.38)!important;}
  .action-block{left:77px;right:auto;bottom:94px;font-size:15px;color:#fbebff!important;
    background:
      radial-gradient(circle at 30% 28%,rgba(255,255,255,.24),rgba(255,255,255,0) 30%),
      repeating-linear-gradient(180deg,rgba(255,255,255,.04) 0 2px,rgba(255,255,255,0) 2px 6px),
      linear-gradient(180deg,#5b257f,#231036)!important;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.52),0 0 0 2px rgba(216,136,255,.18),0 0 16px rgba(216,136,255,.18),0 10px 18px rgba(0,0,0,.38)!important;}
  .action-super{left:77px;right:auto;bottom:8px;color:#261000!important;
    background:
      radial-gradient(circle at 30% 28%,rgba(255,245,206,.34),rgba(255,255,255,0) 30%),
      repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0 2px,rgba(255,255,255,0) 2px 6px),
      linear-gradient(180deg,#f0aa2a,#a85b08)!important;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.5),0 0 0 2px rgba(255,191,56,.24),0 0 18px rgba(255,191,56,.16),0 10px 18px rgba(0,0,0,.38)!important;}
  .menu-btn{position:relative;min-width:76px;height:42px;border-radius:12px;font-size:12px;padding:0 12px;background:none!important;}
  .menu-back,.menu-ok{border-color:rgba(255,255,255,.10);}
  .menu-back{color:#e0beff!important;
    background:
      linear-gradient(90deg,rgba(216,136,255,.20),rgba(216,136,255,.04) 18%,rgba(255,255,255,0) 40%),
      repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0 2px,rgba(255,255,255,0) 2px 6px),
      linear-gradient(180deg,#3f1c61,#170d25)!important;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.56),0 0 0 2px rgba(216,136,255,.14),0 0 14px rgba(216,136,255,.10),0 8px 18px rgba(0,0,0,.38)!important;}
  .menu-ok{color:#aefcff!important;
    background:
      linear-gradient(90deg,rgba(40,233,255,.22),rgba(40,233,255,.04) 18%,rgba(255,255,255,0) 40%),
      repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0 2px,rgba(255,255,255,0) 2px 6px),
      linear-gradient(180deg,#0e8da7,#073441)!important;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.56),0 0 0 2px rgba(40,233,255,.15),0 0 14px rgba(40,233,255,.12),0 8px 18px rgba(0,0,0,.38)!important;}
  .mobile-start-hint{position:absolute;left:50%;top:calc(50% + 145px);transform:translateX(-50%);padding:10px 14px;border-radius:999px;
    background:linear-gradient(180deg,rgba(32,20,46,.92),rgba(10,8,20,.92));border:1px solid rgba(255,206,74,.34);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.52),0 0 18px rgba(255,122,51,.12);font-size:12px;font-weight:900;letter-spacing:.1em;color:#ffce4a;text-align:center;white-space:nowrap;}

  @media (hover:none) and (pointer:coarse){#mobile-controls{display:block;}}
  @media (orientation:portrait) and (hover:none) and (pointer:coarse){
    #wrap{align-items:flex-start;padding-top:max(8px,env(safe-area-inset-top));box-sizing:border-box;}
    canvas{width:100vw!important;height:56.25vw!important;max-height:48vh;}
    #cutscene-layer{top:max(8px,env(safe-area-inset-top));transform:translateX(-50%);
      width:100vw;height:min(56.25vw,48vh);}
    #mobile-controls{top:calc(min(56.25vw,48vh) + max(8px,env(safe-area-inset-top)));
      background:
        radial-gradient(circle at 50% 14%,rgba(255,43,150,.09),rgba(255,43,150,0) 30%),
        linear-gradient(180deg,rgba(6,7,15,0) 0%,rgba(6,7,15,.82) 16%,rgba(6,7,15,.98) 100%);}
    .touch-pad{left:max(10px,env(safe-area-inset-left));bottom:max(20px,env(safe-area-inset-bottom));width:214px;height:184px;transform:none;}
    .touch-actions{right:max(10px,env(safe-area-inset-right));bottom:max(20px,env(safe-area-inset-bottom));width:194px;height:194px;transform:none;}
    .touch-menu{left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));bottom:auto;top:12px;transform:none;
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
    .touch-btn{width:64px;height:64px;border-radius:20px;font-size:25px;}
    .touch-up{left:75px;top:8px}.touch-left{left:6px;top:58px}.touch-right{left:144px;top:58px}.touch-down{left:75px;top:108px}
    .action-btn{width:66px;height:66px;font-size:23px;}
    .action-punch{left:8px;right:auto;bottom:64px;}
    .action-kick{left:120px;right:auto;bottom:64px;}
    .action-block{left:64px;right:auto;bottom:118px;font-size:15px;}
    .action-super{left:64px;right:auto;bottom:10px;}
    .menu-btn{width:100%;min-width:0;height:46px;font-size:13px;padding:0 12px;}
    .menu-back{grid-column:1;}
    .menu-ok{grid-column:2;}
    .mobile-start-hint{top:104px;max-width:calc(100vw - 24px);white-space:normal;line-height:1.25;}
  }
  @media (orientation:landscape) and (hover:none) and (pointer:coarse){
    #mobile-controls{background:none;}
    .touch-pad,.touch-actions,.touch-menu{background:none;border:0;box-shadow:none;}
    .touch-pad::before,.touch-actions::before,.touch-menu::before{display:none;}
    .touch-pad,.touch-actions{top:50%;bottom:auto;transform:translateY(-50%);width:68px;height:118px;}
    .touch-pad{left:max(6px,env(safe-area-inset-left),calc((var(--gutter-left) - 68px) / 2));border-radius:0;}
    .touch-actions{right:max(6px,env(safe-area-inset-right),calc((var(--gutter-right) - 68px) / 2));border-radius:0;}
    .touch-btn{width:38px;height:38px;border-radius:14px;font-size:18px;}
    .touch-up{left:15px;top:0}.touch-left{left:0;top:40px}.touch-right{left:30px;top:40px}.touch-down{left:15px;top:80px}
    .action-btn{width:38px;height:38px;font-size:18px;}
    .action-punch{left:0;right:auto;bottom:40px;}
    .action-kick{left:30px;right:auto;bottom:40px;}
    .action-block{left:15px;right:auto;bottom:80px;font-size:11px;}
    .action-super{left:15px;right:auto;bottom:0;font-size:17px;}
    .touch-menu{position:absolute;inset:0;padding:0;border-radius:0;}
    .menu-btn{height:32px;font-size:11px;padding:0 10px;border-radius:999px;}
    .menu-back,.menu-ok{position:absolute;min-width:0;}
    .menu-back{left:max(6px,env(safe-area-inset-left),calc((var(--gutter-left) - 60px) / 2));top:max(calc(var(--play-top) + 8px),env(safe-area-inset-top));width:60px;}
    .menu-ok{left:max(6px,env(safe-area-inset-left),calc((var(--gutter-left) - 60px) / 2));top:max(calc(var(--play-top) + 46px),calc(env(safe-area-inset-top) + 38px));width:60px;}
    .mobile-start-hint{top:auto;bottom:max(18px,env(safe-area-inset-bottom));font-size:11px;padding:8px 12px;}
  }
  @media (max-width:420px){
    .touch-menu{gap:6px;}
    .menu-btn{min-width:58px;padding:0 8px;}
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas><div id="cutscene-layer" aria-hidden="true"></div></div>
<div id="dev"></div>
<div id="loading">
  <div style="font-size:20px;text-shadow:0 0 12px #ff5c33">CITRYN FIGHT CLUB</div>
  <div class="bar"><div class="fill" id="loadfill"></div></div>
  <small id="loadtxt">LOADING…</small>
</div>
<div id="netui">
  <div id="net-entry" class="panel">
    <h3 id="net-entry-h">PLAY ONLINE</h3>
    <button id="net-create">CREATE PRIVATE MATCH</button>
    <div class="or">— OR JOIN A FRIEND —</div>
    <div class="joinrow">
      <input id="net-join-input" placeholder="paste link or code" autocomplete="off" autocapitalize="characters" spellcheck="false">
      <button class="alt" id="net-join">JOIN</button>
    </div>
    <div class="backrow"><button class="ghost" id="net-entry-back">BACK</button></div>
  </div>
  <div id="net-share" class="panel">
    <span class="lbl" id="net-room-lbl">ROOM</span>
    <span class="code" id="net-room-code">—</span>
    <button id="net-copy">COPY LINK</button>
    <button class="alt" id="net-share-btn">SHARE</button>
    <span id="net-copied">Copied!</span>
  </div>
</div>
<div id="mobile-controls" aria-label="Mobile game controls">
  <div class="mobile-start-hint">TAP OK OR SCREEN TO START</div>
  <div class="touch-menu" aria-label="Menu controls">
    <button class="menu-btn menu-back" data-key="Escape">BACK</button>
    <button class="menu-btn menu-ok" data-key="Enter">OK</button>
  </div>
  <div class="touch-pad" aria-label="Movement controls">
    <button class="touch-btn touch-up" data-key="KeyW">▲</button>
    <button class="touch-btn touch-left" data-key="KeyA">◀</button>
    <button class="touch-btn touch-right" data-key="KeyD">▶</button>
    <button class="touch-btn touch-down" data-key="KeyS">▼</button>
  </div>
  <div class="touch-actions" aria-label="Action controls">
    <button class="action-btn action-block" data-key="KeyR">BLK</button>
    <button class="action-btn action-punch" data-key="KeyF">P</button>
    <button class="action-btn action-kick" data-key="KeyG">K</button>
    <button class="action-btn action-super" data-key="KeyV">★</button>
  </div>
</div>
<script>
(() => {
  const keyNames = {Enter:"Enter",Escape:"Escape",Space:" ",KeyW:"w",KeyA:"a",KeyS:"s",KeyD:"d",KeyF:"f",KeyG:"g",KeyR:"r",KeyV:"v"};
  const activePointers = new Map();
  const downKeys = new Set();
  const controls = document.getElementById("mobile-controls");
  const playCanvas = document.getElementById("c");

  function fireKey(code, type) {
    window.dispatchEvent(new KeyboardEvent(type, { key:keyNames[code] || code, code, bubbles:true, cancelable:true }));
  }
  function press(code) { if (!code || downKeys.has(code)) return; downKeys.add(code); fireKey(code, "keydown"); }
  function release(code) { if (!code || !downKeys.has(code)) return; downKeys.delete(code); fireKey(code, "keyup"); }
  function releaseAll() {
    for (const code of [...downKeys]) release(code);
    activePointers.clear(); controls?.querySelectorAll(".is-down").forEach((b) => b.classList.remove("is-down"));
  }

  function bindButton(btn) {
    const code = btn.dataset.key;
    if (!code) return;
    btn.addEventListener("pointerdown", (e) => {
      e.preventDefault(); e.stopPropagation(); btn.setPointerCapture?.(e.pointerId);
      activePointers.set(e.pointerId, { code, btn }); btn.classList.add("is-down"); press(code);
    });
    const finish = (e) => {
      const active = activePointers.get(e.pointerId); if (!active) return;
      e.preventDefault(); e.stopPropagation(); release(active.code); active.btn.classList.remove("is-down"); activePointers.delete(e.pointerId);
    };
    btn.addEventListener("pointerup", finish);
    btn.addEventListener("pointercancel", finish);
    btn.addEventListener("lostpointercapture", finish);
  }
  controls?.querySelectorAll("button[data-key]").forEach(bindButton);
  window.addEventListener("blur", releaseAll);
  window.addEventListener("cfc:release-mobile-controls", releaseAll);

  function isCompactLandscapeMobile() {
    return !!window.matchMedia?.("(orientation: landscape) and (hover:none) and (pointer: coarse)").matches;
  }
  function syncControlLayoutVars() {
    if (!controls || !playCanvas) return;
    const r = playCanvas.getBoundingClientRect();
    controls.style.setProperty("--play-left", `${Math.max(0, r.left)}px`);
    controls.style.setProperty("--play-right", `${Math.min(window.innerWidth, r.right)}px`);
    controls.style.setProperty("--play-top", `${Math.max(0, r.top)}px`);
    controls.style.setProperty("--play-bottom", `${Math.min(window.innerHeight, r.bottom)}px`);
    controls.style.setProperty("--gutter-left", `${Math.max(0, r.left)}px`);
    controls.style.setProperty("--gutter-right", `${Math.max(0, window.innerWidth - r.right)}px`);
  }
